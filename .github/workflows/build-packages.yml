name: Build public packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Prepare Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.304.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Build release executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $env:LIB = "$env:VULKAN_SDK\Lib;$env:LIB"

          if (Test-Path "Cargo.lock") {
            cargo build --release --locked
          } else {
            Write-Warning "Cargo.lock was not found. Building without --locked."
            cargo build --release
          }

      - name: Assemble Windows package
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $packageName = "RustCraft-windows-x86_64"
          $packageDir = Join-Path $env:RUNNER_TEMP $packageName
          $zipPath = Join-Path $env:RUNNER_TEMP "$packageName.zip"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          # Copy executable
          Copy-Item `
            "target/release/rustcraft.exe" `
            (Join-Path $packageDir "rustcraft.exe")

          # Copy documentation and license files
          foreach ($file in @(
            "README.md",
            "README_ZH.md",
            "LICENSE",
            "ADDITIONAL_TERMS.md"
          )) {
            if (Test-Path $file) {
              Copy-Item $file (Join-Path $packageDir $file)
            }
          }

          # Copy bundled example mods
          if (Test-Path "mods") {
            Copy-Item `
              "mods" `
              (Join-Path $packageDir "mods") `
              -Recurse `
              -Force
          }

          # Copy RustCraft-owned assets.
          #
          # Keep:
          #   assets/icon.ico
          #   assets/icon.rc
          #   assets/fonts/*
          #   assets/minecraft/lang/*
          #
          # Exclude Minecraft assets that users must provide themselves:
          #   assets/indexes
          #   assets/objects
          #   assets/skins
          #   assets/textures
          #
          $sourceAssets = Join-Path $PWD "assets"
          $targetAssets = Join-Path $packageDir "assets"

          New-Item `
            -ItemType Directory `
            -Path $targetAssets `
            -Force | Out-Null

          if (Test-Path $sourceAssets) {
            robocopy `
              $sourceAssets `
              $targetAssets `
              /E `
              /XD `
              "indexes" `
              "objects" `
              "skins" `
              "textures" `
              /XF `
              "*.log" `
              "*.tmp" `
              /NFL `
              /NDL `
              /NJH `
              /NJS `
              /NP

            $robocopyExitCode = $LASTEXITCODE

            # Robocopy returns 0-7 for successful copy outcomes. Clear its
            # non-zero success code so GitHub Actions does not fail this step.
            if ($robocopyExitCode -ge 8) {
              throw "Failed to copy RustCraft assets. Robocopy exit code: $robocopyExitCode"
            }

            $global:LASTEXITCODE = 0
          }

          # Create resource pack directory
          $resourcePackDir = Join-Path $packageDir "resourcepacks"

          New-Item `
            -ItemType Directory `
            -Path $resourcePackDir `
            -Force | Out-Null

          @"
          Place Minecraft resource pack ZIP files in this directory.

          Minecraft resource packs are not included with RustCraft.
          "@ | Set-Content `
            -Path (Join-Path $resourcePackDir "README.txt") `
            -Encoding UTF8

          # Create shader pack directory
          $shaderPackDir = Join-Path $packageDir "shaderpacks"

          New-Item `
            -ItemType Directory `
            -Path $shaderPackDir `
            -Force | Out-Null

          @"
          Shader pack support is currently experimental and under development.

          Place supported shader packs in this directory.
          "@ | Set-Content `
            -Path (Join-Path $shaderPackDir "README.txt") `
            -Encoding UTF8

          # Create Minecraft asset installation instructions
          @"
          ================================================================
          RustCraft - Minecraft Assets Required
          ================================================================

          RustCraft does NOT include Minecraft's original copyrighted game
          assets.

          Before starting RustCraft, you must provide the required Minecraft
          assets from your own legally obtained Minecraft installation.

          ----------------------------------------------------------------
          STEP 1 - Install Minecraft 1.8.9
          ----------------------------------------------------------------

          Install and launch Minecraft Java Edition 1.8.9 at least once using
          the official Minecraft Launcher.

          ----------------------------------------------------------------
          STEP 2 - Copy the official launcher assets
          ----------------------------------------------------------------

          On Windows, locate:

              %APPDATA%\.minecraft\assets

          Copy the required contents of this directory into:

              RustCraft\assets

          The resulting directory should contain:

              RustCraft\
              |-- rustcraft.exe
              |-- assets\
                  |-- indexes\
                  |-- objects\
                  |-- minecraft\
                      |-- lang\

          The minecraft\lang directory is already included with RustCraft.

          Do not delete or overwrite it unless you know what you are doing.

          ----------------------------------------------------------------
          STEP 3 - Extract resources from Minecraft 1.8.9.jar
          ----------------------------------------------------------------

          Locate your legally installed Minecraft 1.8.9 client JAR:

              %APPDATA%\.minecraft\versions\1.8.9\1.8.9.jar

          Open 1.8.9.jar using 7-Zip, WinRAR, or another ZIP-compatible
          archive tool.

          Inside the JAR, locate:

              assets\minecraft

          Extract the required Minecraft resources into:

              RustCraft\assets\minecraft

          Merge the extracted files with the existing directory.

          Do NOT delete the existing:

              RustCraft\assets\minecraft\lang

          directory.

          After preparing the files, your assets directory may look similar
          to:

              assets\
              |-- indexes\
              |-- objects\
              |-- minecraft\
                  |-- blockstates\
                  |-- lang\
                  |-- models\
                  |-- shaders\
                  |-- textures\

          ----------------------------------------------------------------
          IMPORTANT
          ----------------------------------------------------------------

          RustCraft does not provide or redistribute:

          - Minecraft asset indexes
          - Minecraft asset objects
          - Minecraft textures
          - Minecraft models
          - Minecraft sounds
          - Minecraft client JAR files

          You must obtain these resources from your own legally obtained
          Minecraft installation.

          RustCraft is an independent project and is not affiliated with,
          endorsed by, sponsored by, or officially associated with Mojang
          Studios or Microsoft.
          ================================================================
          "@ | Set-Content `
            -Path (Join-Path $packageDir "MINECRAFT_ASSETS_REQUIRED.txt") `
            -Encoding UTF8

          # Verify excluded directories are not accidentally packaged
          $forbiddenPaths = @(
            (Join-Path $packageDir "assets\indexes"),
            (Join-Path $packageDir "assets\objects"),
            (Join-Path $packageDir "assets\skins"),
            (Join-Path $packageDir "assets\textures")
          )

          foreach ($forbiddenPath in $forbiddenPaths) {
            if (Test-Path $forbiddenPath) {
              throw "Forbidden Minecraft asset directory found in package: $forbiddenPath"
            }
          }

          # Verify bundled language files are present
          $langDir = Join-Path $packageDir "assets\minecraft\lang"

          if (-not (Test-Path $langDir)) {
            Write-Warning "assets/minecraft/lang was not found in the package."
          }

          # Create ZIP
          Compress-Archive `
            -Path (Join-Path $packageDir "*") `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal

          "zip_path=$zipPath" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustCraft-windows-x86_64
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  build-linux:
    name: Linux x86_64 AppImage
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -qq

          sudo apt-get install -y -qq \
            build-essential \
            cmake \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libvulkan-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            imagemagick \
            file \
            wget \
            fuse3 \
            libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "Cargo.lock" ]]; then
            cargo build --release --locked
          else
            echo "::warning::Cargo.lock was not found. Building without --locked."
            cargo build --release
          fi

      - name: Prepare AppDir
        id: package
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="RustCraft"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          fi

          APPDIR="${RUNNER_TEMP}/${APP_NAME}.AppDir"
          RUNTIME_DIR="${APPDIR}/usr/share/rustcraft"

          rm -rf "${APPDIR}"

          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          mkdir -p "${RUNTIME_DIR}"
          mkdir -p "${RUNTIME_DIR}/assets"
          mkdir -p "${RUNTIME_DIR}/resourcepacks"
          mkdir -p "${RUNTIME_DIR}/shaderpacks"

          install -Dm755 \
            target/release/rustcraft \
            "${APPDIR}/usr/bin/rustcraft"

          # Copy documentation and licenses
          for file in \
            README.md \
            README_ZH.md \
            LICENSE \
            ADDITIONAL_TERMS.md
          do
            if [[ -f "${file}" ]]; then
              cp "${file}" "${RUNTIME_DIR}/${file}"
            fi
          done

          # Copy example mods
          if [[ -d "mods" ]]; then
            cp -a "mods" "${RUNTIME_DIR}/mods"
          fi

          # Copy allowed RustCraft assets.
          #
          # assets/minecraft/lang is intentionally preserved.
          #
          # Minecraft launcher assets and other original resources are
          # explicitly excluded.
          if [[ -d "assets" ]]; then
            rsync -a \
              --exclude="/indexes/" \
              --exclude="/objects/" \
              --exclude="/skins/" \
              --exclude="/textures/" \
              assets/ \
              "${RUNTIME_DIR}/assets/"
          fi

          # Verify excluded directories
          for path in \
            "${RUNTIME_DIR}/assets/indexes" \
            "${RUNTIME_DIR}/assets/objects" \
            "${RUNTIME_DIR}/assets/skins" \
            "${RUNTIME_DIR}/assets/textures"
          do
            if [[ -e "${path}" ]]; then
              echo "::error::Forbidden Minecraft asset directory included: ${path}"
              exit 1
            fi
          done

          # Resource pack notice
          cat > "${RUNTIME_DIR}/resourcepacks/README.txt" <<'EOF'
          Place Minecraft resource pack ZIP files in this directory.

          Minecraft resource packs are not included with RustCraft.
          EOF

          # Shader pack notice
          cat > "${RUNTIME_DIR}/shaderpacks/README.txt" <<'EOF'
          Shader pack support is currently experimental and under development.

          Place supported shader packs in this directory.
          EOF

          # Minecraft asset instructions
          cat > "${RUNTIME_DIR}/MINECRAFT_ASSETS_REQUIRED.txt" <<'EOF'
          RustCraft - Minecraft Assets Required
          =====================================

          RustCraft does not include Minecraft's original copyrighted game
          assets.

          You must provide the required resources from your own legally
          obtained Minecraft Java Edition 1.8.9 installation.

          1. Install and launch Minecraft Java Edition 1.8.9 at least once
             using the official Minecraft Launcher.

          2. Locate the official Minecraft assets directory:

             Linux:
                 ~/.minecraft/assets

             Copy the required contents into the assets directory used by
             RustCraft.

          3. Locate your Minecraft 1.8.9 client JAR:

                 ~/.minecraft/versions/1.8.9/1.8.9.jar

          4. Open the JAR using a ZIP-compatible archive utility.

          5. Extract the required contents of:

                 assets/minecraft

             into RustCraft's assets/minecraft directory.

          The assets/minecraft/lang directory is already bundled with
          RustCraft and should be preserved.

          RustCraft does not provide or redistribute Minecraft client JAR
          files or original Minecraft game assets.

          RustCraft is not affiliated with Mojang Studios or Microsoft.
          EOF

          # Desktop file
          cat > "${APPDIR}/usr/share/applications/rustcraft.desktop" <<'EOF'
          [Desktop Entry]
          Name=RustCraft
          Comment=Minecraft 1.8.9 client reimplementation
          Exec=rustcraft
          Icon=rustcraft
          Terminal=false
          Type=Application
          Categories=Game;
          StartupNotify=true
          EOF

          # AppRun
          cat > "${APPDIR}/AppRun" <<'EOF'
          #!/usr/bin/env bash
          set -e

          HERE="$(dirname "$(readlink -f "$0")")"

          export PATH="${HERE}/usr/bin:${PATH}"
          export RUSTCRAFT_ROOT="${HERE}/usr/share/rustcraft"

          cd "${RUSTCRAFT_ROOT}"

          exec "${HERE}/usr/bin/rustcraft" "$@"
          EOF

          chmod +x "${APPDIR}/AppRun"

          # Prepare icon
          ICON_OUTPUT="${APPDIR}/usr/share/icons/hicolor/256x256/apps/rustcraft.png"

          if [[ -f "assets/icon.png" ]]; then
            convert \
              "assets/icon.png" \
              -background none \
              -resize 256x256 \
              "${ICON_OUTPUT}"
          elif [[ -f "assets/icon.ico" ]]; then
            convert \
              "assets/icon.ico[0]" \
              -background none \
              -resize 256x256 \
              "${ICON_OUTPUT}"
          else
            echo "::error::Neither assets/icon.png nor assets/icon.ico exists."
            exit 1
          fi

          ln -s \
            "usr/share/applications/rustcraft.desktop" \
            "${APPDIR}/rustcraft.desktop"

          ln -s \
            "usr/share/icons/hicolor/256x256/apps/rustcraft.png" \
            "${APPDIR}/rustcraft.png"

          ln -s \
            "rustcraft.png" \
            "${APPDIR}/.DirIcon"

          echo "appdir=${APPDIR}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Download appimagetool
        shell: bash
        run: |
          set -euo pipefail

          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O "${RUNNER_TEMP}/appimagetool"

          chmod +x "${RUNNER_TEMP}/appimagetool"

      - name: Build AppImage
        id: appimage
        shell: bash
        env:
          APPDIR: ${{ steps.package.outputs.appdir }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail

          OUTPUT_FILE="RustCraft-${VERSION}-x86_64.AppImage"

          ARCH=x86_64 \
            "${RUNNER_TEMP}/appimagetool" \
            --no-appstream \
            "${APPDIR}" \
            "${OUTPUT_FILE}"

          chmod +x "${OUTPUT_FILE}"

          echo "output_file=${OUTPUT_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustCraft-Linux-x86_64
          path: ${{ steps.appimage.outputs.output_file }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: RustCraft-windows-x86_64
          path: release-assets

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: RustCraft-Linux-x86_64
          path: release-assets

      - name: List release files
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true
